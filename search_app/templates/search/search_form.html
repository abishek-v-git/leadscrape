<!DOCTYPE html>
<html>
<head>
    <title>Contact Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .search-container { min-height: 200px; }
        .results-section { display: none; }
        .loading-section { display: none; }
        .console-output { 
            max-height: 150px; 
            overflow-y: auto; 
            background: #f8f9fa; 
            font-family: monospace; 
            font-size: 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-12">
                <!-- 🧭 SEARCH FORM - ALWAYS VISIBLE (TOP) -->
                <div class="card shadow mb-4 search-container">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0"><i class="bi bi-search"></i> Contact Search</h3>
                    </div>
                    <div class="card-body">
                        <form id="searchForm">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Keywords (comma separated)</label>
                                    {{ form.keywords }}
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Job Titles (comma separated)</label>
                                    {{ form.titles }}
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Location</label>
                                    {{ form.location }}
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Max Results</label>
                                    {{ form.max_results }}
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Results Per Page</label>
                                    {{ form.per_page }}
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5" id="searchBtn">
                                    <i class="bi bi-search"></i> <span id="btnText">Start Search</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- ⚡ LOADING - Shows inline below form -->
                <div id="loadingSection" class="loading-section card shadow mb-4">
                    <div class="card-body text-center p-5">
                        <div class="spinner-border text-primary mb-4" style="width: 4rem; height: 4rem;"></div>
                        <h4>🔍 Searching Contacts...</h4>
                        <div class="progress mt-4 mb-4" style="height: 30px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" 
                                 role="progressbar" style="width: 0%">
                                <span id="progressText">0%</span>
                            </div>
                        </div>
                        <div class="console-output p-3" id="consoleOutput"></div>
                    </div>
                </div>

                <!-- ✅ RESULTS - Shows inline below form -->
                <div id="resultsSection" class="results-section card shadow">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-check-circle"></i> 
                            Search Complete! <span id="resultsCount">-</span> results found
                        </h5>
                        <div>
                            <a id="downloadExcel" class="btn btn-success me-2" target="_blank">
                                <i class="bi bi-file-earmark-excel"></i> Excel
                            </a>
                            <a id="downloadCsv" class="btn btn-outline-light" target="_blank">
                                <i class="bi bi-filetype-csv"></i> CSV
                            </a>
                            <button class="btn btn-outline-light" onclick="resetSearch()">
                                <i class="bi bi-arrow-clockwise"></i> New Search
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Company</th>
                                        <th>Contact Name</th>
                                        <th>Title</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                    </tr>
                                </thead>
                                <tbody id="previewTableBody">
                                    <!-- Results populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Show loading, hide results
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('consoleOutput').innerHTML = '';
            
            const formData = new FormData(this);
            const btn = document.getElementById('searchBtn');
            const originalText = document.getElementById('btnText').innerHTML;
            
            btn.disabled = true;
            document.getElementById('btnText').innerHTML = 'Searching...';
            
            try {
                const response = await fetch('/search/start/', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('loadingSection').style.display = 'none';
                    document.getElementById('resultsSection').style.display = 'block';
                    populateResults(data.data);
                } else {
                    throw new Error(JSON.stringify(data.errors || data.error));
                }
            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('consoleOutput').innerHTML += 
                    `<div class="text-danger">❌ Error: ${error.message}</div>`;
                alert('Search failed. Check console above.');
            } finally {
                btn.disabled = false;
                document.getElementById('btnText').innerHTML = originalText;
            }
        });
        
        function populateResults(data) {
            document.getElementById('resultsCount').textContent = `${data.results_count} results`;
            document.getElementById('downloadExcel').href = data.excel_url;
            document.getElementById('downloadCsv').href = data.csv_url;
            
            const tbody = document.getElementById('previewTableBody');
            tbody.innerHTML = '';
            
            data.preview_data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.Company || '-'}</strong></td>
                    <td>${row.Contact_First_Name || ''} ${row.Contact_Last_Name || ''}</td>
                    <td>${row.Contact_Title || '-'}</td>
                    <td>${row.Contact_Email ? `<a href="mailto:${row.Contact_Email}" class="text-decoration-none">${row.Contact_Email}</a>` : '-'}</td>
                    <td>${row.Contact_Phone || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        function resetSearch() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('searchForm').reset();
            document.getElementById('searchBtn').disabled = false;
            document.getElementById('btnText').innerHTML = 'Start Search';
        }
        
        // 👈 Add console logging from backend via data attributes or localStorage if needed
        // Form always visible, results appear/disappear below it
    </script>
</body>
</html>
